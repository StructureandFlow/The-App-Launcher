<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Launcher</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --accent:#e8321a; --danger:#ff2040; }
    html {
      --bg:#F0EBE3; --surface:rgba(255,255,255,0.75); --card:rgba(255,255,255,0.5);
      --border:rgba(0,0,0,0.08); --text:#1a1714; --muted:#8a7f78;
      --shadow:rgba(0,0,0,0.13); --input-bg:rgba(0,0,0,0.05);
    }
    html[data-dark] {
      --bg:#0c0c0e; --surface:rgba(22,22,28,0.92); --card:rgba(30,30,36,0.7);
      --border:rgba(255,255,255,0.08); --text:#ede9e3; --muted:#6b6570;
      --shadow:rgba(0,0,0,0.5); --input-bg:rgba(255,255,255,0.06);
    }
    html,body { height:100%; font-family:'Barlow',sans-serif; color:var(--text); overflow-x:hidden; transition:background .4s,color .3s; }
    body { background:var(--bg); }
    body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E"); }
    #app { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; }

    header { padding:18px 32px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); background:var(--surface); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); position:sticky; top:0; z-index:10; }
    .logo { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:1.3rem; letter-spacing:.1em; text-transform:uppercase; color:var(--text); display:flex; align-items:center; gap:8px; }
    .logo-dot { width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px var(--accent); }
    .pill-btn { background:var(--card); border:1px solid var(--border); color:var(--muted); font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:.8rem; letter-spacing:.1em; text-transform:uppercase; padding:9px 18px; border-radius:50px; cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:7px; backdrop-filter:blur(10px); }
    .pill-btn:hover { color:var(--text); border-color:rgba(232,50,26,.4); background:var(--surface); }

    main { flex:1; padding:36px 32px; display:flex; flex-wrap:wrap; gap:12px; align-content:start; }

    .app-btn { display:inline-flex; align-items:center; gap:12px; padding:0 22px 0 6px; height:56px; cursor:pointer; text-decoration:none; color:#fff; box-shadow:0 4px 16px var(--shadow); transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,filter .2s; animation:fadeUp .3s ease both; position:relative; overflow:hidden; flex-shrink:0; max-width:300px; }
    .app-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 55%); pointer-events:none; }
    .app-btn:hover { transform:translateY(-4px) scale(1.03); box-shadow:0 12px 32px var(--shadow); filter:brightness(1.08); }
    .app-btn:active { transform:scale(.97); }

    .app-badge { width:44px; height:44px; flex-shrink:0; background:rgba(0,0,0,.18); display:flex; align-items:center; justify-content:center; font-size:1.35rem; }
    .app-badge.letter-mode { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:1.3rem; color:#fff; }
    .app-name { font-family:'Barlow',sans-serif; font-weight:700; font-size:.95rem; letter-spacing:.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#fff; }

    .shape-squircle,.shape-squircle .app-badge { border-radius:18px; }
    .shape-circle,.shape-circle .app-badge { border-radius:50px; }
    .shape-rounded,.shape-rounded .app-badge { border-radius:10px; }
    .shape-sharp,.shape-sharp .app-badge { border-radius:4px; }

    .empty { width:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:100px 20px; color:var(--muted); text-align:center; }
    .empty .big { font-size:3rem; }
    .empty p { font-size:.9rem; line-height:1.8; max-width:240px; }
    .empty strong { color:var(--accent); }

    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); z-index:100; align-items:center; justify-content:center; padding:20px; }
    .overlay.open { display:flex; }
    .modal { background:var(--surface); border:1px solid var(--border); border-radius:28px; width:100%; max-width:520px; max-height:92vh; display:flex; flex-direction:column; animation:popIn .22s cubic-bezier(.34,1.56,.64,1) both; box-shadow:0 40px 80px rgba(0,0,0,.25); overflow:hidden; }
    .modal-header { padding:24px 28px 0; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .modal-title { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:1.1rem; text-transform:uppercase; letter-spacing:.1em; }
    .close-btn { width:32px; height:32px; border-radius:50%; background:var(--input-bg); border:none; color:var(--muted); font-size:.95rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; }
    .close-btn:hover { background:rgba(255,32,64,.15); color:var(--danger); }
    .modal-body { padding:20px 28px 28px; overflow-y:auto; flex:1; }

    .tabs { display:flex; gap:4px; margin-bottom:20px; background:var(--input-bg); border-radius:12px; padding:4px; }
    .tab-btn { flex:1; padding:8px; border:none; background:transparent; color:var(--muted); font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:.82rem; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; border-radius:8px; transition:all .18s; }
    .tab-btn.active { background:var(--surface); color:var(--text); box-shadow:0 2px 8px var(--shadow); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    .field { margin-bottom:16px; }
    label { display:block; font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; font-family:'Barlow Condensed',sans-serif; font-weight:700; }
    input[type="text"],input[type="url"],input[type="search"] { width:100%; background:var(--input-bg); border:1px solid var(--border); border-radius:12px; color:var(--text); font-family:'Barlow',sans-serif; font-size:.92rem; padding:11px 14px; outline:none; transition:border-color .15s,box-shadow .15s; }
    input:focus { border-color:rgba(232,50,26,.45); box-shadow:0 0 0 3px rgba(232,50,26,.1); }
    .hint { font-size:.68rem; color:var(--muted); margin-top:5px; }

    /* Preview */
    .preview-wrap { display:flex; align-items:center; justify-content:center; padding:16px 0 6px; }
    .preview-tile { display:inline-flex; align-items:center; gap:12px; padding:0 22px 0 6px; height:56px; border-radius:18px; overflow:hidden; position:relative; box-shadow:0 4px 16px var(--shadow); }
    .preview-tile::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 55%); }
    .preview-badge { width:44px; height:44px; border-radius:12px; background:rgba(0,0,0,.18); display:flex; align-items:center; justify-content:center; font-size:1.35rem; }
    .preview-badge.letter-mode { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:1.3rem; color:#fff; }
    .preview-name { font-family:'Barlow',sans-serif; font-weight:700; font-size:.95rem; color:#fff; white-space:nowrap; }

    /* Icon picker */
    .icon-picker { background:var(--input-bg); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
    .icon-cats { display:flex; gap:0; border-bottom:1px solid var(--border); overflow-x:auto; scrollbar-width:none; }
    .icon-cats::-webkit-scrollbar { display:none; }
    .icon-cat-btn { padding:8px 14px; border:none; background:transparent; color:var(--muted); font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:.75rem; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; white-space:nowrap; transition:all .15s; border-bottom:2px solid transparent; margin-bottom:-1px; }
    .icon-cat-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
    .icon-cat-btn:hover { color:var(--text); }
    .icon-search-wrap { padding:8px 10px; border-bottom:1px solid var(--border); }
    .icon-search-wrap input { padding:7px 12px; font-size:.82rem; border-radius:8px; }
    .icon-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:4px; padding:10px; max-height:160px; overflow-y:auto; }
    .icon-opt { width:100%; aspect-ratio:1; border:2px solid transparent; border-radius:8px; background:transparent; cursor:pointer; font-size:1.3rem; display:flex; align-items:center; justify-content:center; transition:all .15s; }
    .icon-opt:hover { background:var(--card); transform:scale(1.12); }
    .icon-opt.active { border-color:var(--accent); background:rgba(232,50,26,.1); }

    /* Color swatches */
    .color-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:4px; }
    .color-swatch { width:30px; height:30px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform .14s,border-color .14s,box-shadow .14s; flex-shrink:0; position:relative; }
    .color-swatch:hover { transform:scale(1.18); }
    .color-swatch.active { border-color:var(--text); box-shadow:0 0 0 2px var(--border); transform:scale(1.18); }
    .color-swatch.custom-swatch { background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red); }
    .color-swatch.custom-swatch input[type="color"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; border:none; padding:0; border-radius:50%; }

    /* Shape picker */
    .shape-row { display:flex; gap:8px; }
    .shape-pick { width:44px; height:36px; cursor:pointer; background:var(--input-bg); border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:.7rem; font-weight:700; font-family:'Barlow Condensed',sans-serif; letter-spacing:.04em; color:var(--muted); transition:all .15s; text-transform:uppercase; }
    .shape-pick:hover { border-color:var(--accent); color:var(--text); }
    .shape-pick.active { border-color:var(--accent); background:rgba(232,50,26,.12); color:var(--accent); }
    .sp-squircle{border-radius:12px;} .sp-circle{border-radius:50px;} .sp-rounded{border-radius:6px;} .sp-sharp{border-radius:2px;}

    .btn-row { display:flex; gap:10px; margin-top:6px; }
    .btn { flex:1; padding:12px; border-radius:50px; border:none; font-family:'Barlow Condensed',sans-serif; font-size:.9rem; font-weight:700; letter-spacing:.1em; cursor:pointer; transition:all .2s; text-transform:uppercase; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-primary:hover { box-shadow:0 6px 24px rgba(232,50,26,.4); transform:translateY(-1px); }
    .btn-ghost { background:var(--input-bg); border:1px solid var(--border); color:var(--muted); }
    .btn-ghost:hover { color:var(--text); border-color:var(--muted); }

    .divider { border:none; border-top:1px solid var(--border); margin:18px 0; }
    .section-label { font-family:'Barlow Condensed',sans-serif; font-size:.7rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }

    .btn-list { display:flex; flex-direction:column; gap:8px; }
    .btn-item { display:flex; align-items:center; gap:12px; background:var(--input-bg); border:1px solid var(--border); border-radius:14px; padding:10px 12px; }
    .btn-item-swatch { width:38px; height:38px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
    .btn-item-swatch.letter-mode { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:1rem; color:#fff; }
    .btn-item-info { flex:1; min-width:0; }
    .btn-item-name { font-size:.88rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .btn-item-url { font-size:.7rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .item-actions { display:flex; gap:4px; flex-shrink:0; }
    .icon-btn { background:none; border:none; color:var(--muted); font-size:.95rem; cursor:pointer; padding:5px 7px; border-radius:7px; transition:background .15s,color .15s; }
    .icon-btn:hover { background:var(--border); color:var(--text); }
    .icon-btn.del:hover { background:rgba(255,32,64,.12); color:var(--danger); }

    /* Migration banner */
    .migrate-banner { background:rgba(232,50,26,.1); border:1px solid rgba(232,50,26,.25); border-radius:12px; padding:12px 16px; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .migrate-banner p { font-size:.82rem; color:var(--text); line-height:1.4; }
    .migrate-banner strong { color:var(--accent); }
    .migrate-btn { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:7px 14px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:.78rem; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; white-space:nowrap; flex-shrink:0; }
    .migrate-btn:hover { filter:brightness(1.1); }

    /* Background themes */
    .bg-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .bg-swatch { height:52px; border-radius:12px; cursor:pointer; border:2px solid transparent; transition:transform .14s,border-color .15s; display:flex; align-items:flex-end; padding:5px 8px; }
    .bg-swatch:hover { transform:scale(1.04); }
    .bg-swatch.active { border-color:var(--accent); }
    .bg-swatch span { font-size:.62rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; font-family:'Barlow Condensed',sans-serif; text-shadow:0 1px 4px rgba(0,0,0,.5); color:#fff; }
    .bg-custom-row { margin-top:8px; display:flex; gap:10px; align-items:center; }
    .bg-custom-row input[type="color"] { width:44px; height:44px; border:2px solid var(--border); border-radius:10px; cursor:pointer; padding:2px; background:var(--input-bg); }

    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(14px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes popIn  { from{opacity:0;transform:scale(.91) translateY(12px)} to{opacity:1;transform:scale(1) translateY(0)} }

    @media(max-width:480px) {
      header{padding:14px 16px;} main{padding:24px 14px;}
      .modal-header,.modal-body{padding-left:18px;padding-right:18px;}
      .icon-grid { grid-template-columns:repeat(7,1fr); }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo"><div class="logo-dot"></div>LAUNCHER</div>
    <button class="pill-btn" onclick="openSettings()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>
  </header>
  <main id="grid"></main>
</div>

<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Settings</span>
      <button class="close-btn" onclick="closeSettings()">вЬХ</button>
    </div>
    <div class="modal-body">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('buttons')">Buttons</button>
        <button class="tab-btn" onclick="switchTab('appearance')">Appearance</button>
      </div>

      <!-- BUTTONS TAB -->
      <div class="tab-panel active" id="tab-buttons">
        <div id="migrate-area"></div>
        <p class="section-label" id="form-label">Add New Button</p>

        <div class="preview-wrap">
          <div class="preview-tile" id="preview-tile" style="background:#e8321a">
            <div class="preview-badge" id="preview-badge">A</div>
            <span class="preview-name" id="preview-name">App Name</span>
          </div>
        </div>

        <div class="field" style="margin-top:14px">
          <label for="inp-name">App Name</label>
          <input type="text" id="inp-name" placeholder="e.g. YouTube" maxlength="32" oninput="updatePreview()"/>
        </div>
        <div class="field">
          <label for="inp-url">URL</label>
          <input type="url" id="inp-url" placeholder="https://youtube.com"/>
          <p class="hint">Starts with https:// or http://</p>
        </div>
        <div class="field">
          <label>Icon</label>
          <div class="icon-picker">
            <div class="icon-cats" id="icon-cats"></div>
            <div class="icon-search-wrap">
              <input type="search" id="icon-search" placeholder="Search iconsвА¶" oninput="filterIcons()"/>
            </div>
            <div class="icon-grid" id="icon-grid"></div>
          </div>
        </div>
        <div class="field">
          <label>Color</label>
          <div class="color-row" id="color-swatches"></div>
        </div>
        <div class="field">
          <label>Shape</label>
          <div class="shape-row" id="shape-picks"></div>
        </div>

        <div class="btn-row">
          <button class="btn btn-ghost" id="cancel-btn" onclick="cancelEdit()">Cancel</button>
          <button class="btn btn-primary" id="save-btn" onclick="saveButton()">Add Button</button>
        </div>

        <hr class="divider"/>
        <p class="section-label">Your Buttons</p>
        <div class="btn-list" id="btn-list"></div>
      </div>

      <!-- APPEARANCE TAB -->
      <div class="tab-panel" id="tab-appearance">
        <p class="section-label">Background</p>
        <div class="bg-grid" id="bg-grid"></div>
        <div class="bg-custom-row">
          <input type="color" id="custom-bg-picker" value="#F0EBE3" oninput="applyCustomBg(this.value)"/>
          <span style="font-size:.8rem;color:var(--muted);">Custom color</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// вФАвФА Storage keys (all versions for migration)
const KEY      = 'launcher_v4';   // canonical key going forward
const OLD_KEYS = ['launcher_buttons','launcher_buttons_v2','launcher_v3'];

const BG_KEY   = 'launcher_bg_v3';

// вФАвФА Icons by category
const ICON_CATS = {
  'General':   ['рЯФЧ','рЯУМ','в≠Р','рЯФЦ','рЯТ°','рЯФН','рЯУЛ','рЯУЭ','вЬЕ','рЯЧТпЄП','рЯУО','рЯЧВпЄП','рЯТђ','рЯФФ','рЯУ£','рЯОѓ','вЪ°','рЯФ•','рЯТ•','рЯЪА'],
  'Work':      ['рЯТЉ','рЯПҐ','рЯУК','рЯУИ','рЯУЙ','рЯЧГпЄП','рЯЦ•пЄП','рЯТї','рЯЦ®пЄП','рЯУ†','вШОпЄП','рЯУЮ','рЯУІ','рЯУ®','рЯЧУпЄП','рЯУЕ','вП∞','рЯХР','рЯІЊ','рЯУГ'],
  'Finance':   ['рЯТ∞','рЯТµ','рЯТ≥','рЯП¶','рЯУК','рЯТє','рЯ™Щ','рЯТО','рЯПІ','рЯТЄ','рЯ§С','рЯУС','рЯІЃ','рЯТ≤','рЯП™','рЯЫТ','рЯЫНпЄП','рЯІЊ','рЯТ°','рЯУМ'],
  'Health':    ['рЯПЛпЄП','вЪЦпЄП','рЯ•Ч','рЯПГ','рЯІШ','вЭ§пЄП','рЯТК','рЯ©Ї','рЯ©ї','рЯІђ','рЯП•','рЯЪС','рЯ©є','рЯІ™','рЯТЙ','рЯ¶Ј','рЯСБпЄП','рЯІ†','рЯЂА','рЯМ°пЄП'],
  'Media':     ['рЯОђ','рЯОµ','рЯОІ','рЯУЈ','рЯОЃ','рЯУЇ','рЯУї','рЯОЩпЄП','рЯОЪпЄП','рЯОЫпЄП','рЯО§','рЯОЉ','рЯОЮпЄП','рЯЦЉпЄП','рЯУЄ','рЯО≠','рЯО®','вЬПпЄП','рЯЦКпЄП','рЯО≤'],
  'Travel':    ['вЬИпЄП','рЯЪЧ','рЯП†','рЯЧЇпЄП','рЯІ≠','вЫљ','рЯЪВ','рЯЪҐ','рЯП®','рЯПХпЄП','рЯМН','рЯЧЉ','рЯПФпЄП','рЯМК','рЯПЦпЄП','рЯІ≥','рЯОЂ','рЯПЯпЄП','рЯМЖ','рЯМГ'],
  'Food':      ['рЯНФ','вШХ','рЯНХ','рЯ•§','рЯНО','рЯЫТ','рЯН£','рЯ•©','рЯНЈ','рЯНЇ','рЯІБ','рЯН∞','рЯ•Р','рЯ•С','рЯНЬ','рЯН±','рЯМЃ','рЯ•Щ','рЯ•Ч','рЯІГ'],
  'Tech':      ['рЯТї','рЯУ±','вМ®пЄП','рЯЦ±пЄП','рЯЦ•пЄП','рЯУ°','рЯФМ','рЯФЛ','рЯТЊ','рЯТњ','рЯУА','рЯІ©','вЪЩпЄП','рЯФІ','рЯФ©','рЯЫ†пЄП','рЯУ≤','рЯ§Ц','рЯІ≤','рЯФ≠'],
  'Education': ['рЯУЪ','рЯОУ','рЯУЦ','вЬПпЄП','рЯУР','рЯУП','рЯФђ','рЯФ≠','рЯІ™','рЯІЂ','рЯІђ','рЯПЂ','рЯУЭ','рЯЦКпЄП','рЯУУ','рЯУФ','рЯУТ','рЯУХ','рЯЧЇпЄП','рЯМР'],
  'People':    ['рЯС§','рЯС•','рЯС®вАНрЯТЉ','рЯС©вАНрЯТЉ','рЯС®вАНрЯФђ','рЯС©вАНрЯФђ','рЯС®вАНрЯО®','рЯС©вАНрЯО®','рЯС®вАНрЯТї','рЯС©вАНрЯТї','рЯ§Э','рЯСЛ','рЯЩМ','вЭ§пЄП','рЯЂВ','рЯС®вАНрЯС©вАНрЯСІ','рЯІСвАНрЯ§ЭвАНрЯІС','рЯПЖ','рЯОЦпЄП','рЯСС'],
};
const ALL_ICONS = Object.values(ICON_CATS).flat();

const BG_THEMES = [
  {id:'claude',    label:'Claude',    bg:'#F0EBE3', dark:false},
  {id:'parchment', label:'Parchment', bg:'#E8E0D5', dark:false},
  {id:'chalk',     label:'Chalk',     bg:'#F7F5F2', dark:false},
  {id:'midnight',  label:'Midnight',  bg:'#0c0c0e', dark:true },
  {id:'charcoal',  label:'Charcoal',  bg:'#1a1a1f', dark:true },
  {id:'navy',      label:'Navy',      bg:'#0d1322', dark:true },
  {id:'slate',     label:'Slate',     bg:'#1e2333', dark:true },
  {id:'forest',    label:'Forest',    bg:'#111a14', dark:true },
  {id:'wine',      label:'Wine',      bg:'#1a0d10', dark:true },
];

const PRESETS = ['#e8321a','#f5a623','#eab308','#22c55e','#3b82f6','#06b6d4','#ec4899','#8b5cf6','#64748b','#1a1a1a'];
const SHAPES  = [{id:'squircle',label:'Squircle',cls:'sp-squircle'},{id:'circle',label:'Pill',cls:'sp-circle'},{id:'rounded',label:'Rounded',cls:'sp-rounded'},{id:'sharp',label:'Sharp',cls:'sp-sharp'}];

let selectedColor = PRESETS[0];
let selectedShape = 'squircle';
let selectedIcon  = '';         // empty = use letter
let activeIconCat = 'General';
let editingIndex  = -1;

// вФАвФА Storage
function load() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } }
function save(arr) { localStorage.setItem(KEY, JSON.stringify(arr)); }
function loadBg() { try { return JSON.parse(localStorage.getItem(BG_KEY)); } catch { return null; } }
function saveBg(b) { localStorage.setItem(BG_KEY, JSON.stringify(b)); }

// вФАвФА Migration: pull buttons from any old key that has data
function detectOldData() {
  for (const k of OLD_KEYS) {
    try {
      const data = JSON.parse(localStorage.getItem(k));
      if (data && data.length) return { key: k, data };
    } catch {}
  }
  return null;
}
function migrateFrom(key, data) {
  const current = load();
  const urls = new Set(current.map(b => b.url));
  const added = data.filter(b => !urls.has(b.url));
  save([...current, ...added]);
  localStorage.removeItem(key);
  render(); renderList();
  document.getElementById('migrate-area').innerHTML = '';
}
function renderMigrateBanner() {
  const area = document.getElementById('migrate-area');
  const old  = detectOldData();
  if (!old) { area.innerHTML = ''; return; }
  area.innerHTML = `<div class="migrate-banner">
    <p>Found <strong>${old.data.length} button${old.data.length>1?'s':''}</strong> from a previous version. Import them?</p>
    <button class="migrate-btn" onclick="migrateFrom('${old.key}', ${JSON.stringify(old.data).replace(/'/g,'&#39;')})">Import</button>
  </div>`;
}

// вФАвФА Background
function applyBg(bg) {
  document.body.style.background = bg.bg;
  bg.dark ? document.documentElement.setAttribute('data-dark','') : document.documentElement.removeAttribute('data-dark');
  saveBg(bg); renderBgGrid();
}
function applyCustomBg(color) {
  const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
  applyBg({id:'custom',label:'Custom',bg:color,dark:(r*0.299+g*0.587+b*0.114)<128});
}
function renderBgGrid() {
  const current=loadBg()||BG_THEMES[0];
  const grid=document.getElementById('bg-grid');
  grid.innerHTML='';
  BG_THEMES.forEach(theme=>{
    const sw=document.createElement('div');
    sw.className='bg-swatch'+(current.id===theme.id?' active':'');
    sw.style.background=theme.bg;
    sw.innerHTML=`<span>${theme.label}</span>`;
    sw.onclick=()=>applyBg(theme);
    grid.appendChild(sw);
  });
}

// вФАвФА Shape helpers
function shapeBr(s){return{squircle:'18px',circle:'50px',rounded:'10px',sharp:'4px'}[s]||'18px';}
function badgeBr(s){return{squircle:'12px',circle:'50%',rounded:'6px',sharp:'2px'}[s]||'12px';}
function shapeClass(s){return{squircle:'shape-squircle',circle:'shape-circle',rounded:'shape-rounded',sharp:'shape-sharp'}[s]||'shape-squircle';}

// вФАвФА Render main grid
function render() {
  const buttons=load(), grid=document.getElementById('grid');
  grid.innerHTML='';
  if (!buttons.length) {
    grid.innerHTML=`<div class="empty"><span class="big">рЯЪА</span><p>No apps yet.<br>Open <strong>Settings</strong> to add your first button.</p></div>`;
    return;
  }
  buttons.forEach((btn,i)=>{
    const color=btn.color||PRESETS[0];
    const br=shapeBr(btn.shape), bbr=badgeBr(btn.shape);
    const hasIcon=btn.icon && btn.icon.trim();
    const badgeContent = hasIcon ? btn.icon : (btn.name||btn.url).trim().charAt(0).toUpperCase();
    const badgeCls = hasIcon ? '' : 'letter-mode';
    const a=document.createElement('a');
    a.className='app-btn '+shapeClass(btn.shape);
    a.href=btn.url; a.target='_blank'; a.rel='noopener noreferrer';
    a.style.cssText=`background:${color};animation-delay:${i*0.04}s`;
    a.innerHTML=`<div class="app-badge ${badgeCls}" style="border-radius:${bbr}">${badgeContent}</div><span class="app-name">${esc(btn.name||btn.url)}</span>`;
    grid.appendChild(a);
  });
}

// вФАвФА Render list
function renderList() {
  const buttons=load(), list=document.getElementById('btn-list');
  if (!buttons.length) { list.innerHTML=`<p style="color:var(--muted);font-size:.85rem;padding:4px 0;">No buttons added yet.</p>`; return; }
  list.innerHTML=buttons.map((btn,i)=>{
    const color=btn.color||PRESETS[0];
    const bbr=badgeBr(btn.shape);
    const hasIcon=btn.icon&&btn.icon.trim();
    const badgeContent=hasIcon?btn.icon:(btn.name||btn.url).trim().charAt(0).toUpperCase();
    const badgeCls=hasIcon?'':'letter-mode';
    return `<div class="btn-item">
      <div class="btn-item-swatch ${badgeCls}" style="background:${esc(color)};border-radius:${bbr}">${badgeContent}</div>
      <div class="btn-item-info">
        <div class="btn-item-name">${esc(btn.name||'вАФ')}</div>
        <div class="btn-item-url">${esc(btn.url)}</div>
      </div>
      <div class="item-actions">
        <button class="icon-btn" onclick="startEdit(${i})" title="Edit">вЬПпЄП</button>
        <button class="icon-btn del" onclick="deleteButton(${i})" title="Delete">рЯЧС</button>
      </div>
    </div>`;
  }).join('');
}

// вФАвФА Icon picker
function renderIconCats() {
  const bar=document.getElementById('icon-cats');
  bar.innerHTML='';
  Object.keys(ICON_CATS).forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='icon-cat-btn'+(cat===activeIconCat?' active':'');
    btn.textContent=cat;
    btn.onclick=()=>{ activeIconCat=cat; document.getElementById('icon-search').value=''; renderIconGrid(); renderIconCats(); };
    bar.appendChild(btn);
  });
}
function renderIconGrid(icons) {
  const grid=document.getElementById('icon-grid');
  const list=icons||ICON_CATS[activeIconCat]||[];
  grid.innerHTML='';
  // "None / Letter" option first
  const none=document.createElement('button');
  none.className='icon-opt'+(selectedIcon===''?' active':'');
  none.title='Use first letter'; none.textContent='рЯФ§';
  none.onclick=()=>{ selectedIcon=''; grid.querySelectorAll('.icon-opt').forEach(o=>o.classList.remove('active')); none.classList.add('active'); updatePreview(); };
  grid.appendChild(none);
  list.forEach(ic=>{
    const btn=document.createElement('button');
    btn.className='icon-opt'+(ic===selectedIcon?' active':'');
    btn.textContent=ic;
    btn.onclick=()=>{ selectedIcon=ic; grid.querySelectorAll('.icon-opt').forEach(o=>o.classList.remove('active')); btn.classList.add('active'); updatePreview(); };
    grid.appendChild(btn);
  });
}
function filterIcons() {
  const q=document.getElementById('icon-search').value.trim().toLowerCase();
  if (!q) { renderIconGrid(); return; }
  const results=ALL_ICONS.filter(i=>i.includes(q));
  renderIconGrid(results.length?results:ALL_ICONS.filter((_,idx)=>idx<20));
}

// вФАвФА Live preview
function updatePreview() {
  const name=document.getElementById('inp-name').value.trim()||'App Name';
  const letter=name.charAt(0).toUpperCase();
  const hasIcon=selectedIcon&&selectedIcon.trim();
  document.getElementById('preview-name').textContent=name;
  const badge=document.getElementById('preview-badge');
  badge.textContent=hasIcon?selectedIcon:letter;
  badge.className='preview-badge'+(hasIcon?'':' letter-mode');
}
function updatePreviewStyle() {
  const tile=document.getElementById('preview-tile');
  const badge=document.getElementById('preview-badge');
  tile.style.background=selectedColor;
  tile.style.borderRadius=shapeBr(selectedShape);
  badge.style.borderRadius=badgeBr(selectedShape);
  updatePreview();
}

// вФАвФА Init swatches
function initSwatches(curColor,curShape,curIcon) {
  selectedColor=curColor; selectedShape=curShape; selectedIcon=curIcon||'';

  const row=document.getElementById('color-swatches');
  row.innerHTML='';
  PRESETS.forEach(c=>{
    const sw=document.createElement('div');
    sw.className='color-swatch'+(c===curColor?' active':'');
    sw.style.background=c;
    sw.onclick=()=>{ selectedColor=c; row.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active')); sw.classList.add('active'); updatePreviewStyle(); };
    row.appendChild(sw);
  });
  const custom=document.createElement('div');
  custom.className='color-swatch custom-swatch'+(PRESETS.includes(curColor)?'':' active');
  const picker=document.createElement('input'); picker.type='color'; picker.value=PRESETS.includes(curColor)?'#ffffff':curColor;
  picker.oninput=e=>{ selectedColor=e.target.value; row.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active')); custom.classList.add('active'); updatePreviewStyle(); };
  custom.appendChild(picker); row.appendChild(custom);

  const sr=document.getElementById('shape-picks');
  sr.innerHTML='';
  SHAPES.forEach(sh=>{
    const btn=document.createElement('button');
    btn.className=`shape-pick ${sh.cls}`+(sh.id===curShape?' active':'');
    btn.textContent=sh.label;
    btn.onclick=()=>{ selectedShape=sh.id; sr.querySelectorAll('.shape-pick').forEach(s=>s.classList.remove('active')); btn.classList.add('active'); updatePreviewStyle(); };
    sr.appendChild(btn);
  });

  renderIconCats();
  renderIconGrid();
  updatePreviewStyle();
}

// вФАвФА Edit
function startEdit(index) {
  const btn=load()[index]; editingIndex=index;
  document.getElementById('inp-name').value=btn.name||'';
  document.getElementById('inp-url').value=btn.url||'';
  document.getElementById('form-label').textContent='Edit Button';
  document.getElementById('save-btn').textContent='Save Changes';
  document.getElementById('cancel-btn').textContent='Cancel Edit';
  initSwatches(btn.color||PRESETS[0],btn.shape||'squircle',btn.icon||'');
  updatePreview();
  document.getElementById('tab-buttons').scrollTop=0;
  document.getElementById('inp-name').focus();
}
function cancelEdit(){ editingIndex>=0?resetForm():closeSettings(); }
function resetForm(){
  editingIndex=-1;
  document.getElementById('inp-name').value='';
  document.getElementById('inp-url').value='';
  document.getElementById('form-label').textContent='Add New Button';
  document.getElementById('save-btn').textContent='Add Button';
  document.getElementById('cancel-btn').textContent='Cancel';
  initSwatches(PRESETS[0],'squircle','');
  updatePreview();
}

// вФАвФА Save
function saveButton(){
  const nameEl=document.getElementById('inp-name'), urlEl=document.getElementById('inp-url');
  const name=nameEl.value.trim(); let url=urlEl.value.trim();
  if (!url){ shake(urlEl); return; }
  if (!/^https?:\/\//i.test(url)) url='https://'+url;
  const buttons=load();
  const entry={name:name||url,url,color:selectedColor,shape:selectedShape,icon:selectedIcon};
  editingIndex>=0?buttons[editingIndex]=entry:buttons.push(entry);
  save(buttons); resetForm(); render(); renderList();
}
function deleteButton(index){
  const b=load(); b.splice(index,1); save(b);
  if(editingIndex===index) resetForm();
  render(); renderList();
}

// вФАвФА Modal
function openSettings(){
  document.getElementById('overlay').classList.add('open');
  resetForm(); renderList(); renderBgGrid(); renderMigrateBanner(); switchTab('buttons');
}
function closeSettings(){ document.getElementById('overlay').classList.remove('open'); }
function handleOverlayClick(e){ if(e.target===document.getElementById('overlay')) closeSettings(); }
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['buttons','appearance'][i]===tab));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='tab-'+tab));
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeSettings();
  if(e.key==='Enter'&&document.getElementById('overlay').classList.contains('open')) saveButton();
});
function shake(el){
  el.style.borderColor='var(--danger)'; let n=0;
  const iv=setInterval(()=>{ el.style.transform=`translateX(${n%2===0?5:-5}px)`; if(++n>5){clearInterval(iv);el.style.transform='';el.focus();} },70);
  setTimeout(()=>{el.style.borderColor='';},900);
}
function esc(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// вФАвФА Init
(function(){
  const saved=loadBg()||BG_THEMES[0];
  document.body.style.background=saved.bg;
  if(saved.dark) document.documentElement.setAttribute('data-dark','');
  render();
})();
</script>
</body>
