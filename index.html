<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Launcher</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:  #e8321a;
      --danger:  #ff2040;
      --radius:  24px;
    }

    /* ── Theme vars (set by JS on <html>) ── */
    html {
      --bg:       #F0EBE3;
      --surface:  rgba(255,255,255,0.72);
      --card:     rgba(255,255,255,0.55);
      --border:   rgba(0,0,0,0.08);
      --text:     #1a1714;
      --muted:    #8a7f78;
      --shadow:   rgba(0,0,0,0.12);
      --input-bg: rgba(0,0,0,0.05);
    }
    html[data-dark] {
      --bg:       #0c0c0e;
      --surface:  rgba(22,22,28,0.92);
      --card:     rgba(28,28,34,0.7);
      --border:   rgba(255,255,255,0.08);
      --text:     #ede9e3;
      --muted:    #6b6570;
      --shadow:   rgba(0,0,0,0.45);
      --input-bg: rgba(255,255,255,0.06);
    }

    html, body {
      height: 100%; font-family: 'Barlow', sans-serif;
      color: var(--text); overflow-x: hidden;
      transition: background .4s ease, color .3s ease;
    }
    body { background: var(--bg); }

    /* Noise grain overlay for texture */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    }

    #app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Header ── */
    header {
      padding: 18px 32px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky; top: 0; z-index: 10;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900; font-size: 1.3rem; letter-spacing: .1em; text-transform: uppercase;
      color: var(--text); display: flex; align-items: center; gap: 8px;
    }
    .logo-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }

    .header-btns { display: flex; gap: 8px; }
    .pill-btn {
      background: var(--card); border: 1px solid var(--border); color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: .8rem;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 9px 18px; border-radius: 50px; cursor: pointer;
      transition: all .2s; display: flex; align-items: center; gap: 7px;
      backdrop-filter: blur(10px);
    }
    .pill-btn:hover { color: var(--text); border-color: rgba(232,50,26,.4); background: var(--surface); }
    .pill-btn svg { flex-shrink: 0; }

    /* ── Grid ── */
    main {
      flex: 1; padding: 40px 32px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px; align-content: start;
    }

    /* ── Floating icon buttons (no card) ── */
    .app-btn {
      display: flex; flex-direction: column; align-items: center; gap: 9px;
      padding: 14px 8px;
      background: transparent; border: none; cursor: pointer;
      text-decoration: none; color: var(--text);
      border-radius: 18px;
      transition: transform .2s cubic-bezier(.34,1.56,.64,1), background .15s;
      animation: fadeUp .3s ease both;
    }
    .app-btn:hover { transform: translateY(-5px) scale(1.06); background: var(--card); }
    .app-btn:active { transform: scale(.96); }

    .app-icon {
      width: 62px; height: 62px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.6rem;
      color: #fff; flex-shrink: 0; position: relative; overflow: hidden;
      /* shape set inline */
      filter: drop-shadow(0 4px 12px var(--shadow));
      transition: filter .2s;
    }
    .app-btn:hover .app-icon { filter: drop-shadow(0 8px 20px var(--shadow)); }

    .app-icon::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(145deg, rgba(255,255,255,.22) 0%, transparent 55%);
    }

    .app-label {
      font-size: .74rem; font-weight: 600; letter-spacing: .01em;
      text-align: center; word-break: break-word; color: var(--text);
      max-width: 90px; line-height: 1.3;
    }

    /* ── Shapes ── */
    .shape-circle   { border-radius: 50% !important; }
    .shape-squircle { border-radius: 22px !important; }
    .shape-rounded  { border-radius: 10px !important; }
    .shape-sharp    { border-radius: 4px !important; }

    /* ── Empty ── */
    .empty {
      grid-column: 1/-1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      padding: 100px 20px; color: var(--muted); text-align: center;
    }
    .empty .big { font-size: 3rem; }
    .empty p { font-size: .9rem; line-height: 1.8; max-width: 240px; }
    .empty strong { color: var(--accent); }

    /* ── Overlay ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.55); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      z-index: 100; align-items: center; justify-content: center; padding: 20px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 28px; width: 100%; max-width: 500px; max-height: 92vh;
      display: flex; flex-direction: column;
      animation: popIn .22s cubic-bezier(.34,1.56,.64,1) both;
      box-shadow: 0 40px 80px rgba(0,0,0,.25);
      overflow: hidden;
    }

    .modal-header {
      padding: 24px 28px 0;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .modal-title { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:1.1rem; text-transform:uppercase; letter-spacing:.1em; }
    .close-btn {
      width:32px; height:32px; border-radius:50%; background:var(--input-bg); border:none;
      color:var(--muted); font-size:.95rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center; transition:all .15s;
    }
    .close-btn:hover { background:rgba(255,32,64,.15); color:var(--danger); }

    .modal-body { padding: 20px 28px 28px; overflow-y: auto; flex: 1; }

    /* Tabs */
    .tabs { display:flex; gap:4px; margin-bottom:20px; background:var(--input-bg); border-radius:12px; padding:4px; }
    .tab-btn {
      flex:1; padding:8px; border:none; background:transparent; color:var(--muted);
      font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:.82rem;
      letter-spacing:.08em; text-transform:uppercase; cursor:pointer; border-radius:8px;
      transition:all .18s;
    }
    .tab-btn.active { background:var(--surface); color:var(--text); box-shadow:0 2px 8px var(--shadow); }

    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* ── Form ── */
    .field { margin-bottom:16px; }
    label { display:block; font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; font-family:'Barlow Condensed',sans-serif; font-weight:700; }
    input[type="text"], input[type="url"] {
      width:100%; background:var(--input-bg); border:1px solid var(--border);
      border-radius:12px; color:var(--text); font-family:'Barlow',sans-serif; font-size:.92rem;
      padding:11px 14px; outline:none; transition:border-color .15s, box-shadow .15s;
    }
    input:focus { border-color:rgba(232,50,26,.45); box-shadow:0 0 0 3px rgba(232,50,26,.1); }
    .hint { font-size:.68rem; color:var(--muted); margin-top:5px; }

    /* Color swatches */
    .color-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:4px; }
    .color-swatch {
      width:30px; height:30px; border-radius:50%; cursor:pointer;
      border:2px solid transparent; transition:transform .14s, border-color .14s, box-shadow .14s; flex-shrink:0; position:relative;
    }
    .color-swatch:hover { transform:scale(1.18); }
    .color-swatch.active { border-color:var(--text); box-shadow:0 0 0 2px var(--border); transform:scale(1.18); }
    .color-swatch.custom-swatch { background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red); }
    .color-swatch.custom-swatch input[type="color"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; border:none; padding:0; border-radius:50%; }

    /* Shape picker */
    .shape-row { display:flex; gap:8px; flex-wrap:wrap; }
    .shape-pick {
      width:44px; height:44px; cursor:pointer; background:var(--input-bg);
      border:2px solid var(--border); display:flex; align-items:center; justify-content:center;
      font-size:1.1rem; transition:all .15s; color:var(--muted);
    }
    .shape-pick:hover { border-color:var(--accent); color:var(--text); }
    .shape-pick.active { border-color:var(--accent); background:rgba(232,50,26,.12); color:var(--accent); }
    .shape-circle-pick  { border-radius:50%; }
    .shape-squircle-pick{ border-radius:14px; }
    .shape-rounded-pick { border-radius:6px; }
    .shape-sharp-pick   { border-radius:2px; }

    /* Btn row */
    .btn-row { display:flex; gap:10px; margin-top:6px; }
    .btn { flex:1; padding:12px; border-radius:50px; border:none; font-family:'Barlow Condensed',sans-serif; font-size:.9rem; font-weight:700; letter-spacing:.1em; cursor:pointer; transition:all .2s; text-transform:uppercase; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-primary:hover { box-shadow:0 6px 24px rgba(232,50,26,.4); transform:translateY(-1px); }
    .btn-ghost { background:var(--input-bg); border:1px solid var(--border); color:var(--muted); }
    .btn-ghost:hover { color:var(--text); border-color:var(--muted); }
    .btn-danger { background:rgba(255,32,64,.1); border:1px solid rgba(255,32,64,.2); color:var(--danger); }
    .btn-danger:hover { background:rgba(255,32,64,.2); }

    .divider { border:none; border-top:1px solid var(--border); margin:18px 0; }
    .section-label { font-family:'Barlow Condensed',sans-serif; font-size:.7rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }

    /* Button list */
    .btn-list { display:flex; flex-direction:column; gap:8px; }
    .btn-item {
      display:flex; align-items:center; gap:12px;
      background:var(--input-bg); border:1px solid var(--border);
      border-radius:14px; padding:10px 12px;
    }
    .btn-item-icon { width:36px; height:36px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:1rem; color:#fff; }
    .btn-item-info { flex:1; min-width:0; }
    .btn-item-name { font-size:.88rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .btn-item-url { font-size:.7rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .item-actions { display:flex; gap:4px; flex-shrink:0; }
    .icon-btn { background:none; border:none; color:var(--muted); font-size:.95rem; cursor:pointer; padding:5px 7px; border-radius:7px; transition:background .15s, color .15s; }
    .icon-btn:hover { background:var(--border); color:var(--text); }
    .icon-btn.del:hover { background:rgba(255,32,64,.12); color:var(--danger); }

    /* Background themes */
    .bg-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .bg-swatch {
      height:52px; border-radius:12px; cursor:pointer; border:2px solid transparent;
      transition:transform .14s, border-color .15s; position:relative; overflow:hidden;
      display:flex; align-items:flex-end; padding:5px 7px;
    }
    .bg-swatch:hover { transform:scale(1.04); }
    .bg-swatch.active { border-color:var(--accent); }
    .bg-swatch span { font-size:.62rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; font-family:'Barlow Condensed',sans-serif; text-shadow:0 1px 4px rgba(0,0,0,.4); color:#fff; }
    .bg-custom-row { margin-top:8px; display:flex; gap:10px; align-items:center; }
    .bg-custom-row input[type="color"] { width:44px; height:44px; border:2px solid var(--border); border-radius:10px; cursor:pointer; padding:2px; background:var(--input-bg); }

    /* Scrollbar */
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }

    /* Animations */
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes popIn  { from{opacity:0;transform:scale(.91) translateY(12px)} to{opacity:1;transform:scale(1) translateY(0)} }

    @media(max-width:480px) {
      header{padding:14px 16px;}
      main{padding:24px 12px; grid-template-columns:repeat(auto-fill,minmax(90px,1fr));}
      .modal-header,.modal-body{padding-left:18px;padding-right:18px;}
    }
  </style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo"><div class="logo-dot"></div>THE HUB</div>
    <div class="header-btns">
      <button class="pill-btn" onclick="openSettings()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
    </div>
  </header>
  <main id="grid"></main>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Settings</span>
      <button class="close-btn" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('buttons')">Buttons</button>
        <button class="tab-btn" onclick="switchTab('appearance')">Appearance</button>
      </div>

      <!-- BUTTONS TAB -->
      <div class="tab-panel active" id="tab-buttons">
        <p class="section-label" id="form-section-label">Add New Button</p>

        <div class="field">
          <label for="inp-name">Name</label>
          <input type="text" id="inp-name" placeholder="e.g. YouTube" maxlength="32"/>
        </div>
        <div class="field">
          <label for="inp-url">URL</label>
          <input type="url" id="inp-url" placeholder="https://youtube.com"/>
          <p class="hint">Starts with https:// or http://</p>
        </div>
        <div class="field">
          <label>Color</label>
          <div class="color-row" id="color-swatches"></div>
        </div>
        <div class="field">
          <label>Shape</label>
          <div class="shape-row" id="shape-picks"></div>
        </div>

        <div class="btn-row">
          <button class="btn btn-ghost" id="cancel-btn" onclick="cancelEdit()">Cancel</button>
          <button class="btn btn-primary" id="save-btn" onclick="saveButton()">Add Button</button>
        </div>

        <hr class="divider"/>
        <p class="section-label">Your Buttons</p>
        <div class="btn-list" id="btn-list"></div>
      </div>

      <!-- APPEARANCE TAB -->
      <div class="tab-panel" id="tab-appearance">
        <p class="section-label">Background</p>
        <div class="bg-grid" id="bg-grid"></div>
        <div class="bg-custom-row">
          <input type="color" id="custom-bg-picker" value="#F0EBE3" oninput="applyCustomBg(this.value)"/>
          <span style="font-size:.8rem;color:var(--muted);">Custom color</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'launcher_v3';
const BG_KEY      = 'launcher_bg_v3';

// ── Background themes
const BG_THEMES = [
  { id:'claude',    label:'Claude',    bg:'#F0EBE3', dark:false },
  { id:'parchment', label:'Parchment', bg:'#E8E0D5', dark:false },
  { id:'chalk',     label:'Chalk',     bg:'#F7F5F2', dark:false },
  { id:'midnight',  label:'Midnight',  bg:'#0c0c0e', dark:true  },
  { id:'charcoal',  label:'Charcoal',  bg:'#1a1a1f', dark:true  },
  { id:'navy',      label:'Navy',      bg:'#0d1322', dark:true  },
  { id:'slate',     label:'Slate',     bg:'#1e2333', dark:true  },
  { id:'forest',    label:'Forest',    bg:'#111a14', dark:true  },
  { id:'wine',      label:'Wine',      bg:'#1a0d10', dark:true  },
];

const PRESETS = ['#e8321a','#f5a623','#eab308','#22c55e','#3b82f6','#06b6d4','#ec4899','#8b5cf6','#64748b','#1a1a1a'];
const SHAPES  = [
  { id:'squircle', label:'⬛', cls:'shape-squircle-pick', title:'Squircle' },
  { id:'circle',   label:'⚫', cls:'shape-circle-pick',   title:'Circle'   },
  { id:'rounded',  label:'▪',  cls:'shape-rounded-pick',  title:'Rounded'  },
  { id:'sharp',    label:'◼',  cls:'shape-sharp-pick',    title:'Sharp'    },
];

let selectedColor = PRESETS[0];
let selectedShape = 'squircle';
let editingIndex  = -1; // -1 = adding new

// ── Storage
function load() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }
function save(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

// ── Background
function loadBg() { try { return JSON.parse(localStorage.getItem(BG_KEY)); } catch { return null; } }
function saveBg(b) { localStorage.setItem(BG_KEY, JSON.stringify(b)); }

function applyBg(bg) {
  document.body.style.background = bg.bg;
  if (bg.dark) { document.documentElement.setAttribute('data-dark',''); }
  else { document.documentElement.removeAttribute('data-dark'); }
  saveBg(bg);
  renderBgGrid();
}

function applyCustomBg(color) {
  const isDark = isColorDark(color);
  const bg = { id:'custom', label:'Custom', bg:color, dark:isDark };
  applyBg(bg);
}

function isColorDark(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*0.299 + g*0.587 + b*0.114) < 128;
}

function renderBgGrid() {
  const current = loadBg() || BG_THEMES[0];
  const grid = document.getElementById('bg-grid');
  grid.innerHTML = '';
  BG_THEMES.forEach(theme => {
    const sw = document.createElement('div');
    sw.className = 'bg-swatch' + (current.id === theme.id ? ' active' : '');
    sw.style.background = theme.bg;
    sw.innerHTML = `<span>${theme.label}</span>`;
    sw.onclick = () => applyBg(theme);
    grid.appendChild(sw);
  });
}

// ── Render grid
function shapeClass(s) {
  return { squircle:'shape-squircle', circle:'shape-circle', rounded:'shape-rounded', sharp:'shape-sharp' }[s] || 'shape-squircle';
}

function render() {
  const buttons = load();
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  if (!buttons.length) {
    grid.innerHTML = `<div class="empty"><span class="big">🚀</span><p>No apps yet.<br>Open <strong>Settings</strong> to add your first button.</p></div>`;
    return;
  }
  buttons.forEach((btn, i) => {
    const letter = (btn.name || btn.url).trim().charAt(0).toUpperCase();
    const color  = btn.color || PRESETS[0];
    const shape  = shapeClass(btn.shape);
    const a = document.createElement('a');
    a.className = 'app-btn';
    a.href = btn.url; a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.style.animationDelay = (i * 0.04) + 's';
    a.innerHTML = `
      <div class="app-icon ${shape}" style="background:${esc(color)}">${letter}</div>
      <span class="app-label">${esc(btn.name || btn.url)}</span>`;
    grid.appendChild(a);
  });
}

// ── Render settings list
function renderList() {
  const buttons = load();
  const list = document.getElementById('btn-list');
  if (!buttons.length) {
    list.innerHTML = `<p style="color:var(--muted);font-size:.85rem;padding:4px 0;">No buttons added yet.</p>`;
    return;
  }
  list.innerHTML = buttons.map((btn, i) => {
    const letter = (btn.name || btn.url).trim().charAt(0).toUpperCase();
    const color  = btn.color || PRESETS[0];
    const shape  = shapeClass(btn.shape);
    return `<div class="btn-item">
      <div class="btn-item-icon ${shape}" style="background:${esc(color)}">${letter}</div>
      <div class="btn-item-info">
        <div class="btn-item-name">${esc(btn.name || '—')}</div>
        <div class="btn-item-url">${esc(btn.url)}</div>
      </div>
      <div class="item-actions">
        <button class="icon-btn" onclick="startEdit(${i})" title="Edit">✏️</button>
        <button class="icon-btn del" onclick="deleteButton(${i})" title="Remove">🗑</button>
      </div>
    </div>`;
  }).join('');
}

// ── Swatches
function initSwatches(currentColor, currentShape) {
  // Colors
  const row = document.getElementById('color-swatches');
  row.innerHTML = '';
  PRESETS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (c === currentColor ? ' active' : '');
    sw.style.background = c;
    sw.onclick = () => { selectedColor = c; row.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active')); sw.classList.add('active'); };
    row.appendChild(sw);
  });
  const custom = document.createElement('div');
  custom.className = 'color-swatch custom-swatch' + (PRESETS.includes(currentColor) ? '' : ' active');
  const picker = document.createElement('input'); picker.type='color'; picker.value = PRESETS.includes(currentColor) ? '#ffffff' : currentColor;
  picker.oninput = e => { selectedColor = e.target.value; row.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active')); custom.classList.add('active'); };
  custom.appendChild(picker); row.appendChild(custom);

  // Shapes
  const sr = document.getElementById('shape-picks');
  sr.innerHTML = '';
  SHAPES.forEach(sh => {
    const btn = document.createElement('button');
    btn.className = `shape-pick ${sh.cls}` + (sh.id === currentShape ? ' active' : '');
    btn.title = sh.title; btn.textContent = '';
    btn.style.cssText = 'font-size:0;';
    // draw a mini version
    btn.innerHTML = `<span style="font-size:1.1rem">${sh.label}</span>`;
    btn.onclick = () => { selectedShape = sh.id; sr.querySelectorAll('.shape-pick').forEach(s=>s.classList.remove('active')); btn.classList.add('active'); };
    sr.appendChild(btn);
  });
}

// ── Edit mode
function startEdit(index) {
  const buttons = load();
  const btn = buttons[index];
  editingIndex = index;
  selectedColor = btn.color || PRESETS[0];
  selectedShape = btn.shape || 'squircle';
  document.getElementById('inp-name').value = btn.name || '';
  document.getElementById('inp-url').value  = btn.url  || '';
  document.getElementById('form-section-label').textContent = 'Edit Button';
  document.getElementById('save-btn').textContent = 'Save Changes';
  document.getElementById('cancel-btn').textContent = 'Cancel Edit';
  initSwatches(selectedColor, selectedShape);
  document.getElementById('tab-buttons').scrollTop = 0;
  document.getElementById('inp-name').focus();
}

function cancelEdit() {
  if (editingIndex >= 0) { resetForm(); } else { closeSettings(); }
}

function resetForm() {
  editingIndex = -1;
  selectedColor = PRESETS[0]; selectedShape = 'squircle';
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-url').value  = '';
  document.getElementById('form-section-label').textContent = 'Add New Button';
  document.getElementById('save-btn').textContent = 'Add Button';
  document.getElementById('cancel-btn').textContent = 'Cancel';
  initSwatches(selectedColor, selectedShape);
}

// ── Save (add or update)
function saveButton() {
  const nameEl = document.getElementById('inp-name');
  const urlEl  = document.getElementById('inp-url');
  const name   = nameEl.value.trim();
  let   url    = urlEl.value.trim();
  if (!url) { shake(urlEl); return; }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

  const buttons = load();
  const entry = { name: name || url, url, color: selectedColor, shape: selectedShape };

  if (editingIndex >= 0) {
    buttons[editingIndex] = entry;
  } else {
    buttons.push(entry);
  }
  save(buttons);
  resetForm();
  render(); renderList();
}

function deleteButton(index) {
  const buttons = load(); buttons.splice(index, 1); save(buttons);
  if (editingIndex === index) resetForm();
  render(); renderList();
}

// ── Modal
function openSettings() {
  document.getElementById('overlay').classList.add('open');
  resetForm();
  renderList();
  renderBgGrid();
  switchTab('buttons');
}
function closeSettings() { document.getElementById('overlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('overlay')) closeSettings(); }

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['buttons','appearance'][i] === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-'+tab));
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSettings();
  if (e.key === 'Enter' && document.getElementById('overlay').classList.contains('open')) saveButton();
});

function shake(el) {
  el.style.borderColor = 'var(--danger)'; let n=0;
  const iv = setInterval(() => {
    el.style.transform = `translateX(${n%2===0?5:-5}px)`;
    if (++n>5) { clearInterval(iv); el.style.transform=''; el.focus(); }
  }, 70);
  setTimeout(() => { el.style.borderColor=''; }, 900);
}

function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init
(function init() {
  const saved = loadBg() || BG_THEMES[0];
  document.body.style.background = saved.bg;
  if (saved.dark) document.documentElement.setAttribute('data-dark','');
  render();
})();
</script>
</body>
