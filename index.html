<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>App Launcher</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080809;
      --surface:   #0f0f11;
      --card:      #161619;
      --border:    #252528;
      --accent:    #e8321a;
      --accent2:   #f5a623;
      --text:      #e8e4dc;
      --muted:     #5a5a62;
      --danger:    #ff2040;
      --radius:    10px;
      --glow:      0 0 28px rgba(232,50,26,.30);
      --glow2:     0 0 28px rgba(245,166,35,.25);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      overflow-x: hidden;
    }

    /* steel grid overlay */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* diagonal accent stripe top-left */
    body::after {
      content: '';
      position: fixed; top: -60px; left: -60px;
      width: 340px; height: 340px; z-index: 0;
      background: radial-gradient(ellipse at top left, rgba(232,50,26,.12), transparent 70%);
      pointer-events: none;
    }

    #app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Header ── */
    header {
      padding: 0 32px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    header::after {
      content: '';
      position: absolute; bottom: -2px; left: 0;
      width: 120px; height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900; font-size: 1.5rem; letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text);
      display: flex; align-items: center; gap: 10px;
    }

    .logo-mark {
      width: 28px; height: 28px;
      background: var(--accent);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; color: #fff; font-weight: 900;
    }

    .settings-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: .85rem; letter-spacing: .12em;
      padding: 8px 20px; border-radius: 4px; cursor: pointer;
      transition: all .2s; text-transform: uppercase;
      position: relative; overflow: hidden;
    }
    .settings-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--accent);
      transform: translateX(-100%);
      transition: transform .22s ease;
      z-index: 0;
    }
    .settings-btn:hover::before { transform: translateX(0); }
    .settings-btn:hover { color: #fff; border-color: var(--accent); }
    .settings-btn span { position: relative; z-index: 1; }

    /* ── Grid ── */
    main {
      flex: 1; padding: 36px 32px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
      align-content: start;
    }

    .app-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; padding: 28px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer; text-decoration: none; color: var(--text);
      transition: transform .16s, border-color .16s, box-shadow .16s;
      position: relative; overflow: hidden;
      animation: fadeUp .3s ease both;
    }

    .app-btn::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--btn-accent, var(--accent));
      transform: scaleX(0);
      transition: transform .22s ease;
      transform-origin: left;
    }
    .app-btn:hover { transform: translateY(-4px); border-color: var(--btn-accent, var(--accent)); box-shadow: 0 8px 32px rgba(0,0,0,.5); }
    .app-btn:hover::after { transform: scaleX(1); }
    .app-btn:active { transform: translateY(0); }

    .app-icon {
      width: 52px; height: 52px;
      border-radius: 8px;
      background: var(--btn-accent, var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
      color: #fff; flex-shrink: 0;
      position: relative; overflow: hidden;
    }

    .app-icon::before {
      content: '';
      position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 60%);
    }

    .app-label {
      font-size: .8rem; font-weight: 600; letter-spacing: .04em;
      text-align: center; word-break: break-word;
      color: var(--text); text-transform: uppercase;
    }

    /* ── Empty ── */
    .empty {
      grid-column: 1 / -1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; padding: 80px 20px;
      color: var(--muted); text-align: center;
    }
    .empty .big { font-size: 3rem; }
    .empty p { font-size: .9rem; line-height: 1.7; max-width: 260px; font-family: 'Barlow', sans-serif; }
    .empty strong { color: var(--accent); }

    /* ── Overlay ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.8); backdrop-filter: blur(8px);
      z-index: 100; align-items: center; justify-content: center; padding: 20px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      border-radius: 12px;
      width: 100%; max-width: 500px;
      max-height: 90vh; display: flex; flex-direction: column;
      animation: popIn .22s cubic-bezier(.34,1.56,.64,1) both;
    }

    .modal-header {
      padding: 22px 28px 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 1.2rem; text-transform: uppercase; letter-spacing: .1em;
      color: var(--text);
    }
    .close-btn {
      background: none; border: none; color: var(--muted);
      font-size: 1.2rem; cursor: pointer; line-height: 1; padding: 4px 8px;
      border-radius: 4px; transition: color .15s, background .15s;
    }
    .close-btn:hover { color: var(--danger); background: rgba(255,32,64,.08); }

    .modal-body { padding: 22px 28px; overflow-y: auto; flex: 1; }

    /* ── Form ── */
    .field { margin-bottom: 16px; }
    label {
      display: block; font-size: .72rem; letter-spacing: .12em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    }
    input[type="text"], input[type="url"] {
      width: 100%;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text);
      font-family: 'Barlow', sans-serif; font-size: .92rem;
      padding: 11px 14px; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,50,26,.12); }
    .hint { font-size: .7rem; color: var(--muted); margin-top: 5px; }

    /* ── Color picker row ── */
    .color-row {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 4px;
    }
    .color-swatch {
      width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
      border: 2px solid transparent; transition: transform .12s, border-color .12s;
      flex-shrink: 0;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: #fff; transform: scale(1.15); }
    .color-swatch.custom-swatch {
      background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
      position: relative;
    }
    .color-swatch.custom-swatch input[type="color"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; border: none; padding: 0;
    }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 10px; margin-top: 4px; }
    .btn {
      flex: 1; padding: 12px; border-radius: 6px; border: none;
      font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; font-weight: 700;
      letter-spacing: .1em; cursor: pointer; transition: all .18s; text-transform: uppercase;
    }
    .btn-primary {
      background: var(--accent); color: #fff;
      position: relative; overflow: hidden;
    }
    .btn-primary:hover { box-shadow: var(--glow); transform: translateY(-1px); background: #f03d20; }
    .btn-ghost {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .75rem; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
    }

    /* ── Button list ── */
    .btn-list { display: flex; flex-direction: column; gap: 8px; }
    .btn-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px;
    }
    .btn-item-icon {
      width: 34px; height: 34px; border-radius: 6px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1rem; color: #fff;
    }
    .btn-item-info { flex: 1; min-width: 0; }
    .btn-item-name { font-size: .88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-item-url { font-size: .7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .del-btn {
      background: none; border: none; color: var(--muted);
      font-size: 1rem; cursor: pointer; padding: 4px 8px;
      border-radius: 4px; transition: background .15s, color .15s; flex-shrink: 0;
    }
    .del-btn:hover { background: rgba(255,32,64,.12); color: var(--danger); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.93); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    @media (max-width: 480px) {
      header { padding: 0 16px; }
      main { padding: 20px 14px; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
      .modal-header, .modal-body { padding-left: 18px; padding-right: 18px; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-mark">⚡</div>
      THE HUB
    </div>
    <button class="settings-btn" onclick="openSettings()"><span>⚙ Settings</span></button>
  </header>

  <main id="grid"></main>
</div>

<!-- Settings Modal -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Settings</span>
      <button class="close-btn" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">

      <p class="section-label">Add New Button</p>

      <div class="field">
        <label for="inp-name">Button Name</label>
        <input type="text" id="inp-name" placeholder="e.g. YouTube" maxlength="32"/>
      </div>

      <div class="field">
        <label for="inp-url">Link / URL</label>
        <input type="url" id="inp-url" placeholder="https://youtube.com"/>
        <p class="hint">Must start with https:// or http://</p>
      </div>

      <div class="field">
        <label>Button Color</label>
        <div class="color-row" id="color-swatches"></div>
      </div>

      <div class="btn-row">
        <button class="btn btn-ghost" onclick="closeSettings()">Cancel</button>
        <button class="btn btn-primary" onclick="addButton()">Add Button</button>
      </div>

      <hr class="divider"/>

      <p class="section-label">Your Buttons</p>
      <div class="btn-list" id="btn-list"></div>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'launcher_buttons_v2';

  const PRESET_COLORS = [
    '#e8321a', // crimson red
    '#f5a623', // amber
    '#e8b31a', // gold
    '#2ecc71', // emerald
    '#1a8fe8', // steel blue
    '#00b4d8', // cyan
    '#e81a6a', // hot pink
    '#9b59b6', // deep violet
    '#2c3e50', // dark slate
    '#e8e8e8', // chrome
  ];

  let selectedColor = PRESET_COLORS[0];

  /* ── Init color swatches ── */
  function initSwatches() {
    const row = document.getElementById('color-swatches');
    row.innerHTML = '';

    PRESET_COLORS.forEach(c => {
      const sw = document.createElement('div');
      sw.className = 'color-swatch' + (c === selectedColor ? ' active' : '');
      sw.style.background = c;
      sw.title = c;
      sw.onclick = () => {
        selectedColor = c;
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        sw.classList.add('active');
      };
      row.appendChild(sw);
    });

    // custom color swatch
    const custom = document.createElement('div');
    custom.className = 'color-swatch custom-swatch';
    custom.title = 'Custom color';
    const picker = document.createElement('input');
    picker.type = 'color';
    picker.value = '#ffffff';
    picker.oninput = e => {
      selectedColor = e.target.value;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      custom.classList.add('active');
    };
    custom.appendChild(picker);
    row.appendChild(custom);
  }

  /* ── Load / Save ── */
  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
  function save(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

  /* ── Render grid ── */
  function render() {
    const buttons = load();
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    if (!buttons.length) {
      grid.innerHTML = `
        <div class="empty">
          <span class="big">🚀</span>
          <p>No apps yet.<br>Open <strong>Settings</strong> to add your first button.</p>
        </div>`;
      return;
    }

    buttons.forEach((btn, i) => {
      const letter = (btn.name || btn.url).trim().charAt(0).toUpperCase();
      const color = btn.color || '#e8321a';
      const a = document.createElement('a');
      a.className = 'app-btn';
      a.href = btn.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.style.animationDelay = (i * 0.04) + 's';
      a.style.setProperty('--btn-accent', color);
      a.innerHTML = `
        <div class="app-icon" style="background:${escHtml(color)}">${letter}</div>
        <span class="app-label">${escHtml(btn.name || btn.url)}</span>
      `;
      grid.appendChild(a);
    });
  }

  /* ── Render settings list ── */
  function renderList() {
    const buttons = load();
    const list = document.getElementById('btn-list');

    if (!buttons.length) {
      list.innerHTML = `<p style="color:var(--muted);font-size:.85rem;">No buttons added yet.</p>`;
      return;
    }

    list.innerHTML = buttons.map((btn, i) => {
      const letter = (btn.name || btn.url).trim().charAt(0).toUpperCase();
      const color = btn.color || '#e8321a';
      return `
        <div class="btn-item">
          <div class="btn-item-icon" style="background:${escHtml(color)}">${letter}</div>
          <div class="btn-item-info">
            <div class="btn-item-name">${escHtml(btn.name || '—')}</div>
            <div class="btn-item-url">${escHtml(btn.url)}</div>
          </div>
          <button class="del-btn" onclick="deleteButton(${i})" title="Remove">🗑</button>
        </div>`;
    }).join('');
  }

  /* ── Add ── */
  function addButton() {
    const nameEl = document.getElementById('inp-name');
    const urlEl  = document.getElementById('inp-url');
    const name   = nameEl.value.trim();
    let   url    = urlEl.value.trim();

    if (!url) { shake(urlEl); return; }
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

    const buttons = load();
    buttons.push({ name: name || url, url, color: selectedColor });
    save(buttons);

    nameEl.value = '';
    urlEl.value  = '';
    selectedColor = PRESET_COLORS[0];
    initSwatches();

    render();
    renderList();
  }

  /* ── Delete ── */
  function deleteButton(index) {
    const buttons = load();
    buttons.splice(index, 1);
    save(buttons);
    render();
    renderList();
  }

  /* ── Modal ── */
  function openSettings()  {
    document.getElementById('overlay').classList.add('open');
    initSwatches();
    renderList();
  }
  function closeSettings() { document.getElementById('overlay').classList.remove('open'); }
  function handleOverlayClick(e) { if (e.target === document.getElementById('overlay')) closeSettings(); }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeSettings();
    if (e.key === 'Enter' && document.getElementById('overlay').classList.contains('open')) addButton();
  });

  function shake(el) {
    el.style.borderColor = 'var(--danger)';
    let n = 0;
    const iv = setInterval(() => {
      el.style.transform = `translateX(${n % 2 === 0 ? 5 : -5}px)`;
      if (++n > 5) { clearInterval(iv); el.style.transform = ''; el.focus(); }
    }, 70);
    setTimeout(() => { el.style.borderColor = ''; }, 900);
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  render();
</script>
</body>
</html>
